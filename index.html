<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>location</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        #container {
            text-align: center;
        }
        button {
            font-family: inherit;
            font-size: 1rem;
            background: none;
            border: 1px solid #000000;
            padding: 10px 20px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
        }
        a {
            color: #000000;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="container">
        <button onclick="getLocation()">Get Location</button>
        <div id="result"></div>
    </div>

    <script>
        function getLocation() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Fetching...';

            if (!navigator.geolocation) {
                resultDiv.textContent = 'Geolocation is not supported by your browser.';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const url = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    resultDiv.innerHTML = `<a href="${url}" target="_blank">Google Maps: ${lat}, ${lng}</a>`;
                },
                () => {
                    resultDiv.textContent = 'Unable to retrieve your location.';
                }
            );
        }
    </script>
</body>
</html>
